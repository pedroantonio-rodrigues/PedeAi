services:
  app:
    build: .
    container_name: pedeai-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://pedeai:pedeai@postgres:5432/pedeai
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # Usados apenas pelo seed manual: docker compose exec app npm run db:seed
      ADMIN_NOME: ${ADMIN_NOME:-Administrador}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@pedeai.com}
      ADMIN_SENHA: ${ADMIN_SENHA:-}
    ports:
      - "3000:3000"

  postgres:
    image: postgres:17-alpine
    container_name: pedeai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pedeai
      POSTGRES_USER: pedeai
      POSTGRES_PASSWORD: pedeai
    ports:
      - "5432:5432"
    volumes:
      - pedeai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedeai -d pedeai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pedeai_postgres_data:
